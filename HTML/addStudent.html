<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Page</title>
    <link rel="stylesheet" href="../CSS/header.css">
    <link rel="stylesheet" href="../CSS/addStudent.css">
    

</head>

<body>
    <header id="header">
        <h1>Placement Tracker</h1>
        <input type="search">
        <nav id="navlinks">
        <a href="index.html">Home</a>
        <a href="college.html">Colleges</a>
        <a href="student.html">Students</a>
       <a href="company.html">Companies</a>
        <a href="services.html">Job roles</a>
        </nav>
    </header>

    <div class="form-container">
    <form id="student-form">

    <h2>Add New Student</h2>

    <!-- PERSONAL INFO -->
    <div class="section-title">Personal Information</div>

    <div class="form-grid">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" placeholder="Enter phone number">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Profile Image URL</label>
            <input type="text" placeholder="Paste image link">
        </div>
    </div>

    <!-- ACADEMIC INFO -->
    <div class="section-title">Academic Information</div>

    <div class="form-grid">
        <div class="form-group">
            <label>College ID</label>
            <input type="text" placeholder="Enter college ID">
        </div>

        <div class="form-group">
            <label>Branch</label>
            <input type="text" placeholder="Enter branch">
        </div>

        <div class="form-group">
            <label>Year of Passing</label>
            <input type="number" placeholder="Enter year">
        </div>

        <div class="form-group">
            <label>CGPA</label>
            <input type="text" placeholder="Enter CGPA">
        </div>
    </div>

    <!-- PLACEMENT INFO -->
    <div class="section-title">Placement Information</div>

    <div class="form-grid">
        <div class="form-group">
            <label>Placement Status</label>
            <select>
                <option>Placed</option>
                <option>Not Placed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Company Name</label>
            <input type="text" placeholder="Enter company name">
        </div>

        <div class="form-group">
            <label>Job Role</label>
            <input type="text" placeholder="Enter job role">
        </div>

        <div class="form-group">
            <label>Salary Package (LPA)</label>
            <input type="text" placeholder="Enter salary">
        </div>
    </div>

    <!-- ADDRESS -->
    <div class="section-title">Address</div>

    <div class="form-grid">
        <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Enter city">
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" placeholder="Enter state">
        </div>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="submit-btn">Add Student</button>

</form>
</div>
    <script src="../JS/addStudent.js"></script>
</body>

</html>
